<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор статусов - Вход через Google</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1200px; margin: 0 auto; }
        .card {
            background: white; border-radius: 24px; padding: 24px;
            margin-bottom: 24px; box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
        }
        h1 { font-size: 28px; margin-bottom: 8px; color: #333; }
        .subtitle { color: #666; margin-bottom: 24px; }
        .status-buttons { display: flex; flex-wrap: wrap; gap: 12px; margin: 20px 0; }
        .status-btn {
            padding: 12px 24px; border: none; border-radius: 40px;
            font-size: 16px; font-weight: 600; cursor: pointer;
        }
        .user-item { display: flex; align-items: center; padding: 16px; border-bottom: 1px solid #eee; }
        .status-dot { width: 12px; height: 12px; border-radius: 50%; margin-right: 16px; }
        .my-profile {
            background: #f0f4ff; border-radius: 16px; padding: 16px;
            margin-top: 16px; display: flex; justify-content: space-between;
            align-items: center; flex-wrap: wrap;
        }
        .badge { background: #667eea; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .badge-me { background: #22c55e; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-left: 8px; }
        .refresh-btn { background: #667eea; color: white; border: none; padding: 8px 20px; border-radius: 20px; cursor: pointer; }
        .logout-btn { background: #ef4444; color: white; border: none; padding: 8px 16px; border-radius: 20px; cursor: pointer; }
        .realtime-badge { background: #22c55e; color: white; padding: 4px 12px; border-radius: 20px; font-size: 12px; }
        .loading { text-align: center; color: #999; padding: 40px; }
        .login-container { text-align: center; padding: 40px 20px; }
        .google-btn {
            background: white; color: #444; border: 1px solid #ddd;
            border-radius: 40px; padding: 12px 24px; font-size: 16px;
            font-weight: 600; cursor: pointer; margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container" id="app"><div class="loading">Загрузка...</div></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const URL = 'https://ilzejmsjcatltobzfnqi.supabase.co';
        const KEY = 'sb_publishable_LK_sgk6ANkJkXATU4Qi0fQ_JXqgJwFO';
        const TABLE_NAME = 'workkirill';

        const supabase = createClient(URL, KEY);

        function renderLoginPage() {
            document.getElementById('app').innerHTML = `
                <div class="card login-container">
                    <h1>📊 Монитор группы</h1>
                    <p class="subtitle">Войдите, чтобы увидеть статусы участников</p>
                    <button id="googleSignInBtn" class="google-btn">
                        🔑 Войти через Google
                    </button>
                </div>
            `;
            document.getElementById('googleSignInBtn').onclick = signInWithGoogle;
        }

        function renderMainApp(user) {
            const avatarUrl = user.user_metadata?.avatar_url || '';
            const userName = user.user_metadata?.full_name || user.email?.split('@')[0] || 'Пользователь';
            
            document.getElementById('app').innerHTML = `
                <div class="card">
                    <div style="display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <h1>📊 Монитор группы <span class="realtime-badge">🟢 LIVE</span></h1>
                            <p class="subtitle">Обновляется в реальном времени</p>
                        </div>
                        <button id="logoutBtn" class="logout-btn">🚪 Выйти</button>
                    </div>
                    <div class="my-profile">
                        <div style="display:flex; align-items:center; gap:12px;">
                            ${avatarUrl ? `<img src="${avatarUrl}" style="width:32px;height:32px;border-radius:50%;">` : ''}
                            <div>
                                <span class="badge">Вы</span>
                                <strong>${userName}</strong>
                                <span id="myStatusDisplay" style="margin-left:12px; color:#666;"></span>
                            </div>
                        </div>
                    </div>
                    <div style="margin-top:24px;">
                        <strong>✨ Какой у тебя статус?</strong>
                        <div class="status-buttons">
                            <button class="status-btn" style="background:#fef3c7; color:#d97706;" data-status="📚 Учусь">📚 Учусь</button>
                            <button class="status-btn" style="background:#e8eef5; color:#4b5563;" data-status="☕ Кофе-брейк">☕ Кофе-брейк</button>
                            <button class="status-btn" style="background:#dcfce7; color:#16a34a;" data-status="🎮 В игре">🎮 В игре</button>
                            <button class="status-btn" style="background:#fee2e2; color:#dc2626;" data-status="🏠 Дома">🏠 Дома</button>
                        </div>
                    </div>
                </div>
                <div class="card">
                    <div style="display:flex; justify-content:space-between; margin-bottom:16px;">
                        <strong>👥 Участники группы</strong>
                        <button class="refresh-btn" id="refreshBtn">⟳ Обновить</button>
                    </div>
                    <div id="grouplist"><div class="loading">Загрузка...</div></div>
                </div>
            `;

            document.getElementById('logoutBtn').onclick = signOut;
            document.getElementById('refreshBtn').onclick = fetchGroup;
            document.querySelectorAll('.status-btn').forEach(btn => {
                btn.onclick = () => changeStatus(btn.dataset.status);
            });

            fetchGroup();
        }

        async function signInWithGoogle() {
            const { error } = await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: { redirectTo: 'https://fistyu.github.io/workkirillllll/' }
            });
            if (error) alert('Ошибка: ' + error.message);
        }

        async function signOut() {
            await supabase.auth.signOut();
            checkUser();
        }

        async function changeStatus(statusText) {
            const { data: { user } } = await supabase.auth.getUser();
            if (!user) return;
            await supabase.from(TABLE_NAME).update({ status: statusText }).eq('id', user.id);
            fetchGroup();
        }

        async function fetchGroup() {
            const { data, error } = await supabase.from(TABLE_NAME).select('*').order('username', { ascending: true });
            if (error) {
                document.getElementById('grouplist').innerHTML = `<div style="color:red;">Ошибка: ${error.message}</div>`;
                return;
            }
            if (!data || data.length === 0) {
                document.getElementById('grouplist').innerHTML = '<div class="loading">👻 Пока никого нет</div>';
                return;
            }
            const { data: { user } } = await supabase.auth.getUser();
            const currentUserId = user?.id;
            const colors = {
                '📚 Учусь': '#fef3c7',
                '☕ Кофе-брейк': '#e8eef5',
                '🎮 В игре': '#dcfce7',
                '🏠 Дома': '#fee2e2'
            };
            document.getElementById('grouplist').innerHTML = data.map(u => `
                <div class="user-item">
                    <div class="status-dot" style="background:${colors[u.status] || '#e5e7eb'};"></div>
                    <div style="flex-grow:1;">
                        <strong>${u.username}</strong>
                        ${u.id === currentUserId ? '<span class="badge-me">это вы</span>' : ''}
                        <br><small style="color:#666;">${u.status || '😴 Статус не задан'}</small>
                    </div>
                </div>
            `).join('');
            
            const me = data.find(u => u.id === currentUserId);
            const display = document.getElementById('myStatusDisplay');
            if (me && display) display.innerHTML = `→ ${me.status || 'статус не задан'}`;
        }

        async function ensureProfile(user) {
            if (!user) return;
            const { data: existing } = await supabase.from(TABLE_NAME).select('id').eq('id', user.id).maybeSingle();
            if (!existing) {
                const userName = user.user_metadata?.full_name || user.email?.split('@')[0] || 'Новый пользователь';
                await supabase.from(TABLE_NAME).insert({
                    id: user.id,
                    username: userName,
                    status: '🎉 Только что зашел'
                });
            }
        }

        async function checkUser() {
            const { data: { user } } = await supabase.auth.getUser();
            if (user) {
                await ensureProfile(user);
                renderMainApp(user);
            } else {
                renderLoginPage();
            }
        }

        supabase.auth.onAuthStateChange((event) => {
            if (event === 'SIGNED_IN' || event === 'SIGNED_OUT') checkUser();
        });

        checkUser();
    </script>
</body>
</html>
