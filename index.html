<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Монитор статусов</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .card {
            background: white;
            border-radius: 24px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 20px 35px -10px rgba(0,0,0,0.2);
        }

        h1 {
            font-size: 28px;
            margin-bottom: 8px;
            color: #333;
        }

        .subtitle {
            color: #666;
            margin-bottom: 24px;
        }

        .status-buttons {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            margin: 20px 0;
        }

        .status-btn {
            padding: 12px 24px;
            border: none;
            border-radius: 40px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .status-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
        }

        .user-item {
            display: flex;
            align-items: center;
            padding: 16px;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }

        .user-item:hover {
            background: #f8f9ff;
        }

        .status-dot {
            width: 12px;
            height: 12px;
            border-radius: 50%;
            margin-right: 16px;
            transition: all 0.3s;
        }

        .my-profile {
            background: #f0f4ff;
            border-radius: 16px;
            padding: 16px;
            margin-top: 16px;
        }

        .badge {
            background: #667eea;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .refresh-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 20px;
            border-radius: 20px;
            cursor: pointer;
            font-weight: 500;
        }

        .realtime-badge {
            background: #22c55e;
            color: white;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            display: inline-block;
            margin-left: 12px;
        }

        .error-message {
            background: #fee2e2;
            color: #dc2626;
            padding: 12px;
            border-radius: 12px;
            margin: 16px 0;
            font-size: 14px;
        }

        .success-message {
            background: #dcfce7;
            color: #16a34a;
            padding: 12px;
            border-radius: 12px;
            margin: 16px 0;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>
                📊 Монитор группы
                <span class="realtime-badge">🟢 LIVE</span>
            </h1>
            <p class="subtitle">Обновляется в реальном времени</p>

            <div class="my-profile" id="myInfo">
                <span class="badge">Вы</span>
                <span id="myName">Загрузка...</span>
                <span id="myStatusDisplay" style="margin-left: 12px; color: #666;"></span>
            </div>

            <div style="margin-top: 24px;">
                <strong>✨ Какой у тебя статус?</strong>
                <div class="status-buttons">
                    <button class="status-btn" style="background: #fef3c7; color: #d97706;" onclick="changeStatus('Учусь', '#fef3c7')">📚 Учусь</button>
                    <button class="status-btn" style="background: #e8eef5; color: #4b5563;" onclick="changeStatus('Кофе-брейк', '#e8eef5')">☕ Кофе-брейк</button>
                    <button class="status-btn" style="background: #dcfce7; color: #16a34a;" onclick="changeStatus('В игре', '#dcfce7')">🎮 В игре</button>
                    <button class="status-btn" style="background: #fee2e2; color: #dc2626;" onclick="changeStatus('Дома', '#fee2e2')">🏠 Дома</button>
                </div>
            </div>
        </div>

        <div class="card">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px;">
                <strong>👥 Участники группы</strong>
                <button class="refresh-btn" onclick="fetchGroup()">⟳ Обновить</button>
            </div>
            <div id="grouplist">
                <div style="text-align: center; color: #999; padding: 40px;">Загрузка...</div>
            </div>
        </div>
    </div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        // ========== ВАШИ ДАННЫЕ ==========
        const URL = 'https://rmcerhigziyibvdbqanl.supabase.co';
        const KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImlsemVqbXNqY2F0bHRvYnpmbnFpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzYwNzA1MjQsImV4cCI6MjA5MTY0NjUyNH0.LOYiL2hRdfkTys5LWxjLgbqnfH8EyEozGleBTaUs6nA';
        const MY_ID = 'f0815a93-f244-45e5-958e-9c3b60cc96f1';
        const TABLE_NAME = 'workkirill';  // ✅ ПРАВИЛЬНОЕ НАЗВАНИЕ
        // ================================

        const supabase = createClient(URL, KEY);

        // Функция для изменения статуса
        window.changeStatus = async (statusText, colorCode) => {
            console.log('🔄 Меняю статус на:', statusText);
            
            const { data, error } = await supabase
                .from(TABLE_NAME)
                .update({ 
                    status: statusText, 
                    color: colorCode 
                })
                .eq('id', MY_ID);

            if (error) {
                console.error('❌ Ошибка:', error);
                alert('Ошибка: ' + error.message);
            } else {
                console.log('✅ Статус обновлён!');
                fetchGroup();
            }
        };

        // Загрузка всех пользователей
        window.fetchGroup = async function() {
            console.log('📡 Загружаю список из таблицы', TABLE_NAME);
            
            const { data, error } = await supabase
                .from(TABLE_NAME)
                .select('*')
                .order('username', { ascending: true });

            if (error) {
                console.error('❌ Ошибка загрузки:', error);
                document.getElementById('grouplist').innerHTML = 
                    `<div class="error-message">❌ Ошибка: ${error.message}</div>`;
                return;
            }

            if (!data || data.length === 0) {
                document.getElementById('grouplist').innerHTML = 
                    '<div style="text-align: center; padding: 40px;">👻 Нет пользователей. Добавьте себя в таблицу!</div>';
                return;
            }

            console.log('✅ Загружено пользователей:', data.length);

            // Рендерим список
            const listHtml = data.map(user => `
                <div class="user-item">
                    <div class="status-dot" style="background: ${user.color || '#cccccc'};"></div>
                    <div style="flex-grow: 1;">
                        <strong>${escapeHtml(user.username)}</strong>
                        ${user.id === MY_ID ? ' <span class="badge" style="background: #22c55e;">это вы</span>' : ''}
                        <br>
                        <small style="color: #666;">${user.status || '😴 Статус не задан'}</small>
                    </div>
                </div>
            `).join('');
            
            document.getElementById('grouplist').innerHTML = listHtml;

            // Информация о текущем пользователе
            const me = data.find(u => u.id === MY_ID);
            if (me) {
                document.getElementById('myName').innerHTML = me.username;
                document.getElementById('myStatusDisplay').innerHTML = `→ ${me.status || 'статус не задан'}`;
            } else {
                document.getElementById('myName').innerHTML = '⚠️ Пользователь не найден!';
                document.getElementById('myStatusDisplay').innerHTML = '→ добавьте себя в таблицу workkirill';
            }
        };

        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }

        // Запуск
        console.log('🚀 Приложение запущено');
        console.log('📌 Ваш ID:', MY_ID);
        console.log('📋 Таблица:', TABLE_NAME);
        fetchGroup();
    </script>
</body>
</html>
