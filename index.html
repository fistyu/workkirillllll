<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Тест входа Google</title>
</head>
<body>
    <h1>Тест входа через Google</h1>
    <button id="loginBtn">Войти через Google</button>
    <button id="logoutBtn" style="display:none;">Выйти</button>
    <div id="status"></div>

    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm';

        const supabase = createClient(
            'https://ilzejmsjcatltobzfnqi.supabase.co',
            'sb_publishable_LK_sgk6ANkJkXATU4Qi0fQ_JXqgJwFO'
        );

        document.getElementById('loginBtn').onclick = async () => {
            await supabase.auth.signInWithOAuth({
                provider: 'google',
                options: {
                    redirectTo: 'https://fistyu.github.io/workkirillllll/'
                }
            });
        };

        document.getElementById('logoutBtn').onclick = async () => {
            await supabase.auth.signOut();
            location.reload();
        };

        // Проверка при загрузке
        const { data: { session } } = await supabase.auth.getSession();
        
        if (session?.user) {
            document.getElementById('loginBtn').style.display = 'none';
            document.getElementById('logoutBtn').style.display = 'block';
            document.getElementById('status').innerHTML = `
                <p>✅ Вы вошли как: ${session.user.email}</p>
                <p>Имя: ${session.user.user_metadata?.full_name || 'не указано'}</p>
            `;
        } else {
            document.getElementById('status').innerHTML = '<p>Вы не авторизованы</p>';
        }
    </script>
</body>
</html>
